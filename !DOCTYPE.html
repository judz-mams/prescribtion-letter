<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Download Popup</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* Background overlay */
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.15);
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:20px;
    }

    /* Popup card */
    .popup{
      width:100%;
      max-width:420px;
      background:white;
      border-radius:28px;
      padding:24px 20px;
      box-shadow:0 8px 30px rgba(0,0,0,0.15);
      animation:slideUp .25s ease;
    }

    @keyframes slideUp{
      from{
        transform:translateY(40px);
        opacity:0;
      }
      to{
        transform:translateY(0);
        opacity:1;
      }
    }

    .popup-text{
      font-size:20px;
      color:#333;
      margin-bottom:24px;
      text-align:center;
    }

    .actions{
      display:flex;
      justify-content:space-between;
      gap:14px;
    }

    .btn{
      flex:1;
      border:none;
      border-radius:16px;
      padding:16px;
      font-size:18px;
      cursor:pointer;
      transition:0.2s;
    }

    .btn-drive{
      background:#f1f3f4;
      color:#222;
    }

    .btn-download{
      background:#111;
      color:white;
    }

    .btn:hover{
      transform:scale(1.02);
    }
  </style>
</head>

<body>

  <div class="overlay">
    <div class="popup">

      <div class="popup-text">
        Download file or open it?
      </div>

      <div class="actions">

        <button class="btn btn-drive"
          onclick="window.open('https://drive.google.com', '_blank')">
          Open with Drive
        </button>

        <!-- DOWNLOAD BUTTON -->
        <a href="Dis-chem-sick_note-K_RAMETSI-20260415.pdf" download style="flex:1;">
          <button class="btn btn-download" style="width:100%;">
            Download
          </button>
        </a>

      </div>

    </div>
  </div>

</body>
</html>
